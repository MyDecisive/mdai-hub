etcd:
  replicaCount: 3
  auth:
    rbac:
      create: false
    token:
      enabled: false
  global:
    security:
      allowInsecureImages: true
  image:
    registry: docker.io
    repository: greptime/etcd
    tag: 3.6.1-debian-12-r3
## AWS start
#  persistence:
#    enabled: true
#    storageClass: gp2
#    accessModes:
#      - ReadWriteOnce
#    size: 8Gi
#    selector: {}
## AWS end

greptimedb-operator:
  enabled: false

kubeprometheusstack:
  prometheus:
    prometheusSpec:
      remoteWrite:
        - url: 'http://mdai-greptimedb.mdai.svc.cluster.local:4000/v1/prometheus/write?db={{ .Values.global.greptime.databaseName | default "public" }}'
          basicAuth:
            username:
              name: greptimedb-users-auth
              key: GREPTIME_USER
            password:
              name: greptimedb-users-auth
              key: GREPTIME_PASSWD
