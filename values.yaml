_defaults:
  otlpEndpoint: &otlpEndpoint http://hub-monitor-mdai-collector-service:4318
  emptyAnnotations: &emptyAnnotations {}
  emptyTolerations: &emptyTolerations []

persistentStorage:
  nats:
    pv:
      # Specifies whether a PersistentVolumes should be created
      create: false
      # Deployment platform: can be either "aws" or "kind" (for local development)
      platform: kind
      # directory where data will be stored if deployment platform is "kind"
      localPath: "/tmp/mdai-data"
      # shoudl match the storageClass of the PersistentVolumeClaims
      storageClass: mdai
      size: 1Gi
      # id - is AWS id of EBS volume
      # az - is AWS availability zone
      volumes:
        - id: vol-1
          az: us-east-1a
        - id: vol-2
          az: us-east-1b
        - id: vol-3
          az: us-east-1c

opentelemetry-operator:
  enabled: true
  admissionWebhooks:
    certManager:
      enabled: true
    autoGenerateCert:
      enabled: false
      recreate: false
      certPeriodDays: 365
  fullnameOverride: opentelemetry-operator
  crds:
    create: true
  manager:
    image:
      repository: ghcr.io/open-telemetry/opentelemetry-operator/opentelemetry-operator
      tag: 0.148.0
    collectorImage:
      repository: otel/opentelemetry-collector-contrib
      tag: 0.149.0
    leaderElection:
      enabled: false
    env:
      ENABLE_WEBHOOKS: "true"
      WATCH_NAMESPACE: mdai
  kubeRBACProxy:
    enabled: false
  tolerations: *emptyTolerations

metrics-server:
  enabled: false

mdai-operator:
  enabled: true
  crds:
    create: true
  serviceAccount:
    create: true
    name: "mdai-operator-controller-manager"
  admissionWebhooks:
    certManager:
      enabled: true
      issuerRef: {}
      certificateAnnotations: {}
      issuerAnnotations: {}
      duration: ""
      renewBefore: ""
    autoGenerateCert:
      enabled: false
      recreate: false
      certPeriodDays: 365
  fullnameOverride: mdai-operator
  controllerManager:
    manager:
      env:
        otelExporterOtlpEndpoint: *otlpEndpoint
        otelSdkDisabled: "true"
      tolerations: *emptyTolerations
      image:
        repository: ghcr.io/mydecisive/mdai-operator
        tag: 0.2.12-envoy

mdai-gateway:
  enabled: true
  otelExporterOtlpEndpoint: *otlpEndpoint
  otelSdkDisabled: true
  deployment:
    annotations: *emptyAnnotations
    tolerations: *emptyTolerations

mdai-event-hub:
  enabled: true
  otelSdkDisabled: true
  otelExporterOtlpEndpoint: *otlpEndpoint
  hopLimit: 2
  deployment:
    replicas: 1 # adjust as per your requirement, 1 - 3 replicas recommended
    annotations: *emptyAnnotations
    tolerations: *emptyTolerations

mdai-s3-logs-reader:
  enabled: false
  awsRegion: "us-east-1"
  s3Bucket: "mdai-collector-logs"
  awsAccessKeySecret: aws-credentials
  deployment:
    annotations: *emptyAnnotations
    tolerations: *emptyTolerations

kubeprometheusstack:
  nameOverride: kube-prometheus-stack
  fullnameOverride: kube-prometheus-stack
  enabled: true
  crds:
    enabled: true
  defaultRules:
    create: false
  prometheus-windows-exporter:
    prometheus:
      monitor:
        enabled: false
  grafana:
    enabled: false
    defaultDashboardsEnabled: false
    adminPassword: mdai
    plugins:
      - yesoreyeram-infinity-datasource
    datasources:
      datasources.yaml:
        apiVersion: 1
        datasources:
          - name: DS_INFINTYJSON
            id: DS_INFINTYJSON
            type: yesoreyeram-infinity-datasource
            access: proxy
            jsonData:
              dataSourceType: json
    dashboardProviders:
      dashboardproviders.yaml:
        apiVersion: 1
        providers:
          - name: 'default'
            orgId: 1
            folder: ''
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/default
    dashboards:
      default: {}
  alertmanager:
    enabled: true
    alertmanagerSpec:
      tolerations: *emptyTolerations
    config:
      route:
        group_by: ["cluster", "alertname"]
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 12h
        receiver: 'mdai-gateway'
        routes:
        - matchers:
           - alertname = "Watchdog"
          receiver: 'null'
      receivers:
      - name: 'null'
      - name: 'mdai-gateway'
        webhook_configs:
          - url: 'http://mdai-gateway.mdai.svc.cluster.local:8081/alerts/alertmanager'
            send_resolved: true
    serviceMonitor:
      selfMonitor: true
  serviceMonitor:
    enabled: false
  kubernetesServiceMonitors:
    enabled: true
  kubeApiServer:
    enabled: false
  kubelet:
    enabled: true
  kubeControllerManager:
    enabled: false
    serviceMonitor:
      enabled: false
  coreDns:
    enabled: false
    serviceMonitor:
      enabled: false
  kubeEtcd:
    enabled: false
    serviceMonitor:
      enabled: false
  kubeScheduler:
    enabled: false
    serviceMonitor:
      enabled: false
  kubeProxy:
    enabled: false
    serviceMonitor:
      enabled: false
  kubeStateMetrics:
    enabled: true
  nodeExporter:
    enabled: true
  prometheus-node-exporter:
    prometheus:
      monitor:
        enabled: false
  prometheusOperator:
    enabled: true
    namespaces:
      releaseNamespace: true
    kubeletService:
      enabled: true
    serviceMonitor:
      selfMonitor: false
    tolerations: *emptyTolerations
  prometheus:
    serviceMonitor:
      selfMonitor: false
    prometheusSpec:
      externalLabels:
        cluster: mdai-cluster
      serviceMonitorSelector: {}
      serviceMonitorNamespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: "{{ .Release.Namespace }}"
      podMonitorSelector: {}
      podMonitorNamespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: "{{ .Release.Namespace }}"
      ruleSelector: {}
      ruleNamespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: "{{ .Release.Namespace }}"
      serviceMonitorSelectorNilUsesHelmValues: false
      podMonitorSelectorNilUsesHelmValues: false
      tolerations: *emptyTolerations
      # See PV.md for a persistent storage example.
      ruleSelectorNilUsesHelmValues: false
      additionalArgs:
      - name: enable-feature
        value: exemplar-storage
      - name: enable-feature
        value: otlp-write-receiver
      - name: enable-feature
        value: promql-experimental-functions
      image:
        registry: quay.io
        repository: prometheus/prometheus
        tag: v2.54.1
        sha: ""
      additionalScrapeConfigs:
        - job_name: mdai-observer-scrape
          honor_labels: true
          tls_config:
            insecure_skip_verify: true
          kubernetes_sd_configs:
            - role: pod
          relabel_configs:
            - source_labels: [__meta_kubernetes_pod_annotation_mdai_component_type, __meta_kubernetes_pod_annotation_prometheus_io_scrape, __meta_kubernetes_pod_container_port_number]
              separator: ;
              regex: mdai-(watcher|observer);true;8899
              action: keep
        - job_name: mdai-observer-otel-scrape
          honor_labels: true
          tls_config:
            insecure_skip_verify: true
          kubernetes_sd_configs:
            - role: pod
          relabel_configs:
            - source_labels: [__meta_kubernetes_pod_annotation_mdai_component_type, __meta_kubernetes_pod_annotation_prometheus_io_scrape, __meta_kubernetes_pod_container_port_number]
              separator: ;
              regex: mdai-(watcher|observer);true;8888
              action: keep
        - job_name: hub-monitor-scrape
          honor_labels: true
          tls_config:
            insecure_skip_verify: true
          kubernetes_sd_configs:
            - role: pod
          relabel_configs:
            - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_component, __meta_kubernetes_pod_container_port_number]
              separator: ;
              regex: hub-monitor-mdai-collector;8899
              action: keep
valkey:
  enabled: true
  image:
    registry: public.ecr.aws
    repository: decisiveai/valkey
    tag: 9.0.1
  auth:
    enabled: true
    aclUsers:
      default:
        permissions: "~* &* +@all"
        passwordKey: "VALKEY_PASSWORD"      # Key in usersExistingSecret (defaults to username)
    usersExistingSecret: valkey-secret
  resources:
    requests:
      memory: "64Mi"
      cpu: "100m"
    limits:
      memory: "128Mi"
      cpu: "200m"
  tolerations: *emptyTolerations
  # See PV.md for a persistent storage example.

# default NATS setup is very minimal and aim at saving resources and ensuring basic functionality.
# adjust according to your specific needs.
# see details at https://github.com/nats-io/k8s/tree/main/helm/charts/nats
nats:
  enabled: true
  promExporter:
    enabled: true
    podMonitor:
      enabled: true
  config:
    monitor:
      enabled: true
    cluster:
      enabled: true
      replicas: 3
    jetstream:
      enabled: true
      memStorage:
        enabled: false # KEEP MEMORY STORAGE DISABLED !
        maxSize: 1Gi # ensure that container has a sufficient memory limit greater than maxSize
      fileStore:
        enabled: true # Set true if you want a persistent storage
        # Uncomment a section below to enable PVCs created
        #  dir: "/data/jetstream"
        pvc:
#          enabled: true
#          storageClassName: "mdai"  # Specify your storage class
#          size: 1Gi # Specify your storage size
          merge: # Add apiVersion/kind to avoid ArgoCD drift on implicit fields
            apiVersion: v1
            kind: PersistentVolumeClaim

# Uncomment a section below to allocate JetStream Cluster on 3 separate hosts
#  podTemplate:
#    topologySpreadConstraints:
#      kubernetes.io/hostname:
#        maxSkew: 1
#        whenUnsatisfiable: DoNotSchedule
  auth:
    enabled: true
    users:
      - user: mdai
        passwordFrom:
          secretKeyRef:
            name: nats-secret
            key: NATS_PASSWORD
  podTemplate:
    merge:
      spec:
        tolerations: []
  deployment:
    merge:
      spec:
        tolerations: []
  natsBox:
    podTemplate:
      merge:
        spec:
          tolerations: []

infraSetup:
  resources: {}
  tolerations: *emptyTolerations
  nodeSelector: {}
  affinity: {}

cleanup:
  tolerations: *emptyTolerations

envoy:
  enabled: true
  xds:
    enabled: true
    serverAddress: mdai-operator-xds-service.mdai.svc.cluster.local
    serverPort: 18000
    nodeId: envoy-hub-proxy
    clusterName: mdai-hub
  metrics:
    enabled: true
  serviceMonitor:
    enabled: true
