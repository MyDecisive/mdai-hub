{{- $parent := . }}
{{- if and .Values.kubeprometheusstack .Values.kubeprometheusstack.grafana .Values.kubeprometheusstack.grafana.dashboards .Values.kubeprometheusstack.grafana.dashboards.default }}
  {{- $dashboards := .Values.kubeprometheusstack.grafana.dashboards.default }}
  {{- range $key, $value := $dashboards }}
    {{- $filePath := (printf "files/dashboards/%s.json" $key) }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "mdai-hub.fullname" $parent }}-dashboard-{{ $key | trunc 40 | trimSuffix "-" }}
  namespace: {{ $parent.Release.Namespace }}
  labels:
    {{- include "mdai-hub.labels" $parent | nindent 4 }}
    grafana_dashboard: "1"
data:
  {{ $key }}.json: |
    {{ $parent.Files.Get $filePath | replace ".mdai.svc.cluster.local" (printf ".%s.svc.cluster.local" $parent.Release.Namespace) | nindent 4 }}
  {{- end }}
{{- end }}
