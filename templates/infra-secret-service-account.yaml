{{- if or .Values.nats.enabled .Values.valkey.enabled }}
{{- $infraSAName := printf "%s-infra-secret-creator-sa" (include "mdai-hub.fullname" .) }}
{{- $infraRoleName := printf "%s-infra-secret-creator-role" (include "mdai-hub.fullname" .) }}
{{- $infraRBName := printf "%s-infra-secret-creator-rb" (include "mdai-hub.fullname" .) }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $infraSAName }}
  annotations:
    "argocd.argoproj.io/sync-wave": "-2"
    "helm.sh/hook": pre-install
    "helm.sh/hook-weight": "-2"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $infraRoleName }}
  annotations:
    "argocd.argoproj.io/sync-wave": "-2"
    "helm.sh/hook": pre-install
    "helm.sh/hook-weight": "-2"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $infraRBName }}
  annotations:
    "argocd.argoproj.io/sync-wave": "-2"
    "helm.sh/hook": pre-install
    "helm.sh/hook-weight": "-2"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $infraRoleName }}
subjects:
- kind: ServiceAccount
  name: {{ $infraSAName }}
{{- end }}
